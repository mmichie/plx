pre-commit:
  commands:
    fmt:
      run: cargo fmt --check
      fail_text: "Run `cargo fmt` to fix formatting"
    clippy:
      run: cargo clippy --all-targets -- -D warnings
      fail_text: "Fix clippy warnings before committing"

pre-push:
  commands:
    test:
      run: cargo test
      fail_text: "Tests must pass before pushing"
